<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Second Business | Bella</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'GmarketSans';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
  font-weight: 700;
  font-display: swap;
}
@font-face {
  font-family: 'GmarketSans';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
  font-weight: 500;
  font-display: swap;
}
:root {
  --navy: #1B3A5C;
  --navy-deep: #12283F;
  --gold: #D4A94A;
  --gold-soft: #E3C57E;
  --ivory: #FAF7F2;
  --ink: #2A2A2A;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--ivory);
  color: var(--ink);
  word-break: keep-all;
  overflow-wrap: break-word;
  line-height: 1.7;
  padding-bottom: env(safe-area-inset-bottom);
}
.wrap { max-width: 520px; margin: 0 auto; }

/* ===== Language toggle ===== */
.lang-toggle {
  position: fixed;
  top: calc(14px + env(safe-area-inset-top));
  right: 14px;
  z-index: 100;
  display: flex;
  gap: 6px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(27,58,92,0.15);
  border-radius: 30px;
  padding: 5px;
  box-shadow: 0 4px 16px rgba(27,58,92,0.12);
}
.lang-btn {
  min-width: 50px;
  min-height: 50px;
  border: none;
  background: transparent;
  border-radius: 50%;
  font-size: 15px;
  font-weight: 700;
  color: var(--navy);
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: background .2s, color .2s;
}
.lang-btn.active { background: var(--navy); color: var(--gold-soft); }

/* ===== Hero ===== */
.hero {
  min-height: 100dvh;
  background: linear-gradient(168deg, var(--navy-deep) 0%, var(--navy) 62%, #2A5580 100%);
  color: var(--ivory);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: calc(90px + env(safe-area-inset-top)) 28px 70px;
  position: relative;
  overflow: hidden;
}
.hero::after {
  content: '';
  position: absolute;
  bottom: -60px; right: -80px;
  width: 300px; height: 300px;
  border: 1px solid rgba(212,169,74,0.25);
  border-radius: 50%;
}
.hero::before {
  content: '';
  position: absolute;
  bottom: -20px; right: -40px;
  width: 300px; height: 300px;
  border: 1px solid rgba(212,169,74,0.12);
  border-radius: 50%;
}
.overline {
  font-family: 'GmarketSans', 'Noto Sans KR', sans-serif;
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 0.32em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 18px;
}
.hero h1 {
  font-family: 'GmarketSans', 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: clamp(26px, 7.4vw, 36px);
  line-height: 1.42;
  margin-bottom: 22px;
}
.hero h1 .gold { color: var(--gold-soft); }
.hero .sub {
  font-size: 15.5px;
  font-weight: 300;
  color: rgba(250,247,242,0.85);
  max-width: 40ch;
}
.scroll-hint {
  position: absolute;
  bottom: calc(24px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  color: rgba(250,247,242,0.55);
  font-size: 12px;
  letter-spacing: 0.2em;
  animation: bob 2.2s ease-in-out infinite;
}
@keyframes bob {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(7px); }
}
@media (prefers-reduced-motion: reduce) {
  .scroll-hint { animation: none; }
  html { scroll-behavior: auto; }
}

/* ===== Sections ===== */
section { padding: 64px 28px; }
.sec-overline {
  font-family: 'GmarketSans', 'Noto Sans KR', sans-serif;
  font-weight: 500;
  font-size: 11.5px;
  letter-spacing: 0.3em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.sec-title {
  font-family: 'GmarketSans', 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: clamp(21px, 6vw, 27px);
  color: var(--navy);
  line-height: 1.45;
  margin-bottom: 22px;
}
.body-txt {
  font-size: 15.5px;
  color: #444;
  margin-bottom: 16px;
}
.body-txt strong { color: var(--navy); font-weight: 700; }

/* story quote */
.regret-quote {
  border-left: 3px solid var(--gold);
  padding: 6px 0 6px 18px;
  margin: 26px 0;
  font-size: 16.5px;
  font-weight: 500;
  color: var(--navy);
  font-style: italic;
}

/* twist section */
.twist {
  background: var(--navy);
  color: var(--ivory);
}
.twist .sec-title { color: var(--ivory); }
.twist .body-txt { color: rgba(250,247,242,0.85); }
.twist-q {
  font-family: 'GmarketSans', 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: clamp(20px, 5.6vw, 25px);
  line-height: 1.5;
  color: var(--gold-soft);
  margin: 26px 0;
}

/* offer ticket */
.ticket {
  background: #fff;
  border: 1.5px solid var(--navy);
  border-radius: 18px;
  overflow: hidden;
  margin: 28px 0 8px;
  box-shadow: 0 10px 30px rgba(27,58,92,0.1);
}
.ticket-top {
  background: var(--navy);
  color: var(--ivory);
  padding: 20px 24px 16px;
  position: relative;
}
.ticket-top .t-label {
  font-size: 11px;
  letter-spacing: 0.26em;
  color: var(--gold);
  font-family: 'GmarketSans', 'Noto Sans KR', sans-serif;
  font-weight: 500;
  text-transform: uppercase;
}
.ticket-top .t-price {
  font-family: 'GmarketSans', 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: 42px;
  line-height: 1.2;
}
.ticket-top .t-price small { font-size: 16px; font-weight: 500; color: var(--gold-soft); }
.ticket-divider {
  height: 0;
  border-top: 2px dashed rgba(27,58,92,0.25);
  position: relative;
}
.ticket-divider::before, .ticket-divider::after {
  content: '';
  position: absolute;
  top: -11px;
  width: 22px; height: 22px;
  background: var(--ivory);
  border-radius: 50%;
}
.ticket-divider::before { left: -13px; border-right: 1.5px solid var(--navy); }
.ticket-divider::after { right: -13px; border-left: 1.5px solid var(--navy); }
.ticket-body { padding: 20px 24px 24px; }
.ticket-body li {
  list-style: none;
  padding: 9px 0 9px 30px;
  position: relative;
  font-size: 15px;
  color: #444;
}
.ticket-body li::before {
  content: '✓';
  position: absolute;
  left: 2px;
  color: var(--gold);
  font-weight: 900;
}

/* earnings steps */
.earn-card {
  background: #fff;
  border-radius: 16px;
  padding: 22px 22px 20px;
  margin-bottom: 16px;
  border: 1px solid rgba(27,58,92,0.1);
  box-shadow: 0 4px 14px rgba(27,58,92,0.06);
}
.earn-num {
  display: inline-block;
  font-family: 'GmarketSans', 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--gold);
  border: 1.5px solid var(--gold);
  border-radius: 20px;
  padding: 3px 12px;
  margin-bottom: 10px;
}
.earn-title {
  font-family: 'GmarketSans', 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: 17px;
  color: var(--navy);
  margin-bottom: 6px;
}
.earn-desc { font-size: 14.5px; color: #555; }
.earn-desc b { color: var(--navy); }

/* mission */
.mission {
  text-align: center;
  background: linear-gradient(180deg, var(--ivory) 0%, #F1EBDF 100%);
}
.mission-line {
  font-family: 'GmarketSans', 'Noto Sans KR', sans-serif;
  font-weight: 500;
  font-size: clamp(17px, 5vw, 21px);
  color: var(--navy);
  line-height: 1.65;
  margin: 18px 0;
}
.mission-line .gold { color: var(--gold); font-weight: 700; }

/* CTA */
.cta-sec {
  background: var(--navy-deep);
  color: var(--ivory);
  text-align: center;
  padding: 70px 28px calc(80px + env(safe-area-inset-bottom));
}
.cta-quote {
  font-style: italic;
  color: var(--gold-soft);
  font-size: 15.5px;
  margin-bottom: 26px;
}
.cta-title {
  font-family: 'GmarketSans', 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: clamp(22px, 6vw, 27px);
  margin-bottom: 14px;
}
.cta-sub { font-size: 14.5px; color: rgba(250,247,242,0.8); margin-bottom: 30px; }
.cta-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 56px;
  padding: 0 40px;
  background: var(--gold);
  color: var(--navy-deep);
  font-family: 'GmarketSans', 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: 16.5px;
  border-radius: 32px;
  text-decoration: none;
  box-shadow: 0 8px 24px rgba(212,169,74,0.35);
  transition: transform .15s;
}
.cta-btn:active { transform: scale(0.97); }

footer {
  background: var(--navy-deep);
  color: rgba(250,247,242,0.4);
  text-align: center;
  font-size: 12px;
  padding: 0 28px calc(28px + env(safe-area-inset-bottom));
}

@media (max-width: 360px) {
  section { padding: 52px 20px; }
  .hero { padding-left: 20px; padding-right: 20px; }
  .lang-btn { min-width: 46px; min-height: 46px; font-size: 13.5px; }
}
</style>
</head>

function applyLang(lang) {
  const t = I18N[lang] || I18N.ko;
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.textContent = t[key];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });
  document.getElementById('ctaLink').href = t.cta;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  try { localStorage.setItem('bella_lang', lang); } catch(e) {}
}

function detectLang() {
  try {
    const saved = localStorage.getItem('bella_lang');
    if (saved && I18N[saved]) return saved;
  } catch(e) {}
  const nav = (navigator.language || 'en').toLowerCase();
  if (nav.startsWith('ko')) return 'ko';
  if (nav.startsWith('zh')) return 'zh';
  if (nav.startsWith('es')) return 'es';
  return 'en';
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});
applyLang(detectLang());
</script>
